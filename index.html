<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios IES Pedro Castro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.8); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes orbit {
            from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            padding: 80px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s ease-out;
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .header {
            position: relative;
            margin-bottom: 50px;
        }

        .logo-container {
            font-size: 80px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            color: #999;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            margin: 15px auto 0;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-wrapper {
            animation: slideIn 0.8s ease-out;
            animation-fill-mode: both;
        }

        .btn-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .btn-wrapper:nth-child(2) { animation-delay: 0.2s; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px 35px;
            color: white;
            text-decoration: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
            z-index: 1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(-2px) scale(0.98);
        }

        .btn-eso {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-eso:hover {
            box-shadow: 0 20px 50px rgba(245, 87, 108, 0.5);
        }

        .btn-bachillerato {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .btn-bachillerato:hover {
            box-shadow: 0 20px 50px rgba(79, 172, 254, 0.5);
        }

        .icon {
            margin-right: 12px;
            font-size: 24px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .btn:hover .icon {
            transform: scale(1.3) rotate(10deg);
        }

        .text-label {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .decoration {
            position: absolute;
            opacity: 0.15;
            font-size: 100px;
            font-weight: bold;
            z-index: 0;
            user-select: none;
        }

        .deco1 {
            top: -40px;
            right: -30px;
            color: #667eea;
        }

        .deco2 {
            bottom: -50px;
            left: -40px;
            color: #764ba2;
        }

        .footer-text {
            color: #ddd;
            font-size: 12px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 50px 25px;
            }

            h1 {
                font-size: 32px;
            }

            .logo-container {
                font-size: 60px;
            }

            .btn {
                padding: 20px 25px;
                font-size: 16px;
            }

            .icon {
                font-size: 20px;
            }

            .logo-container {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="decoration deco1">📚</div>
        <div class="decoration deco2">🎓</div>

        <div class="header">
            <div class="logo-container">📋</div>
            <h1>HORARIOS</h1>
            <p class="subtitle">IES Pedro Castro</p>
            <div class="divider"></div>
        </div>
        
        <div class="buttons-container">
            <div class="btn-wrapper">
                <a href="Horarios%20IES%20Pedro%20Castro%20(ESO).pdf" class="btn btn-eso" target="_blank">
                    <span class="text-label">
                        <span class="icon">📖</span>
                        <span>Horarios ESO</span>
                    </span>
                </a>
            </div>
            <div class="btn-wrapper">
                <a href="Horarios_Bachillerato_IES_Pedro_Castro_copia.pdf" class="btn btn-bachillerato" target="_blank">
                    <span class="text-label">
                        <span class="icon">🎓</span>
                        <span>Horarios Bachillerato</span>
                    </span>
                </a>
            </div>
        </div>

        <p class="footer-text">Haz clic para acceder a tu horario</p>
    </div>

    <script>
        // Crear estrellas animadas en el fondo
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 15; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random() * 0.5 + 0.3;
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
